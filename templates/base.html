<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Šefl s.r.o. – Fakturace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --accent:       #7B3F1E;   /* tmavě hnědá – hlavní */
    --accent-dark:  #5C2E12;   /* ještě tmavší hnědá */
    --accent-light: #F5EDE4;   /* světlá krémová */
    --brick:        #B85C38;   /* cihlová */
    --sand:         #D4A96A;   /* písková / zlatavá */
    --sand-light:   #FDF6EC;   /* velmi světlá písková – pozadí */
    --danger:       #C0392B;
    --success:      #2E7D32;
    --warning:      #B7770D;
    --bg:           #FAF5EE;   /* teplá krémová */
    --card:         #FFFFFF;
    --border:       #E8D9C5;
    --text:         #2C1A0E;   /* tmavě hnědá na text */
    --muted:        #8A6A50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Nav */
  nav {
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 62px;
    border-bottom: 3px solid var(--sand);
    box-shadow: 0 2px 12px rgba(44,26,14,0.25);
  }
  nav .brand {
    color: var(--sand);
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    white-space: nowrap;
  }
  nav .brand .logo {
    width: 34px; height: 34px;
    background: var(--sand);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  nav .brand .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    color: rgba(212,169,106,0.75);
    display: block;
    line-height: 1;
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  nav a {
    color: rgba(253,246,236,0.82);
    font-size: 0.88rem;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
    font-weight: 500;
  }
  nav a:hover { color: var(--sand); background: rgba(255,255,255,0.12); text-decoration: none; }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .page-header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent-dark);
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    box-shadow: 0 1px 4px rgba(123,63,30,0.06);
  }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.1rem; border-radius: 7px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
  .btn:hover { opacity: 0.88; text-decoration: none; transform: translateY(-1px); }
  .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--brick) 100%); color: white; box-shadow: 0 2px 6px rgba(123,63,30,0.3); }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

  /* Badges */
  .badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-paid    { background: #D1FAE5; color: #065F46; }
  .badge-unpaid  { background: #FEF3C7; color: #92400E; }
  .badge-overdue { background: #FEE2E2; color: #991B1B; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 0.75rem; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.6rem 1rem; border-bottom: 2px solid var(--border);
    background: var(--sand-light);
  }
  th:first-child { border-radius: 8px 0 0 0; }
  th:last-child  { border-radius: 0 8px 0 0; }
  td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--accent-light); }

  /* Forms */
  .form-group { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; }
  input, select, textarea {
    width: 100%; padding: 0.55rem 0.85rem;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 0.9rem; background: white; transition: border 0.15s;
    font-family: 'Inter', sans-serif;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,63,30,0.1); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.4rem;
    box-shadow: 0 1px 4px rgba(123,63,30,0.06);
    border-left: 4px solid var(--sand);
  }
  .stat-card .label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; font-family: 'Playfair Display', serif; }

  /* Alerts */
  .alert { padding: 0.9rem 1.2rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem; }
  .alert-danger  { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
  .alert-warning { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
  .alert-success { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }

  /* Decorative wheat divider for section headers */
  .page-header h1::after {
    content: '';
    display: block;
    width: 40px;
    height: 3px;
    background: linear-gradient(90deg, var(--sand), var(--brick));
    border-radius: 2px;
    margin-top: 6px;
  }
</style>
</head>
<body>
<nav>
  <div class="brand">
    <div class="logo">🌾</div>
    <div>
      Šefl s.r.o.
      <span class="subtitle">Fakturace</span>
    </div>
  </div>
  <a href="/">Přehled</a>
  <a href="/invoices/new">Nová faktura</a>
  <a href="/clients">Klienti</a>
  <a href="/products">Produkty</a>
  <a href="/settings">⚙️ Nastavení</a>
  <form method="post" action="/logout" style="margin:0;">
    <button type="submit" style="background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;padding:0.5rem 0.9rem;opacity:0.7;">Odhlásit</button>
  </form>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}" style="margin-top:1rem;">
        {{ '✓' if category == 'success' else '⚠️' }} {{ message }}
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
