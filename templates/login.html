<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení — Fakturace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #FAF5EE;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .login-box {
      background: white;
      border: 1px solid #E8D9C5;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(92,46,18,0.08);
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand .logo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .brand h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #5C2E12;
      margin: 0;
    }
    .brand .subtitle {
      font-size: 0.85rem;
      color: #8A6A50;
    }
    .form-control:focus {
      border-color: #7B3F1E;
      box-shadow: 0 0 0 0.2rem rgba(123,63,30,0.15);
    }
    .btn-login {
      background: #5C2E12;
      border: none;
      color: white;
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #7B3F1E; color: white; }
    .error-msg {
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      color: #B91C1C;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <div class="logo">🌾</div>
      <h1>Šefl s.r.o.</h1>
      <div class="subtitle">Fakturace — přihlášení</div>
    </div>

    {% if error %}
    <div class="error-msg">🔒 {{ error }}</div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="color:#5C2E12;">Heslo</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn btn-login">Přihlásit se</button>
    </form>
  </div>
</body>
</html>
