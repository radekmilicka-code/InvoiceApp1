<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení — Fakturace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0F1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-wrap {
      display: flex;
      width: 100%;
      max-width: 860px;
      min-height: 480px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #1a1f2e 0%, #111827 100%);
      border-right: 1px solid #252A38;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .login-left .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
    }

    .login-left .brand-tag {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4F6EF7;
      background: rgba(79,110,247,0.12);
      padding: 3px 10px;
      border-radius: 4px;
    }

    .login-left .tagline {
      font-size: 1.5rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      line-height: 1.4;
    }

    .login-left .tagline span { color: #4F6EF7; }

    .login-left .footer-note {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    .login-right {
      width: 360px;
      background: #fff;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-right h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: 0.35rem;
    }

    .login-right .sub {
      font-size: 0.85rem;
      color: #6B7280;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.9rem;
      border: 1.5px solid #E5E7EF;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 1rem;
      transition: border 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #4F6EF7;
      box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 0.65rem;
      background: #4F6EF7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 2px 12px rgba(79,110,247,0.35);
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }

    .error-msg {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #B91C1C;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-left">
      <div>
        <div class="brand-name">Šefl s.r.o.</div>
        <div class="brand-tag">Fakturace</div>
      </div>
      <div class="tagline">
        Správa faktur<br>
        <span>jednoduše a rychle.</span>
      </div>
      <div class="footer-note">Interní systém — přístup jen pro oprávněné osoby</div>
    </div>

    <div class="login-right">
      <h2>Přihlášení</h2>
      <div class="sub">Zadejte heslo pro přístup do systému</div>

      {% if error %}
      <div class="error-msg">🔒 {{ error }}</div>
      {% endif %}

      <form method="post">
        <input type="hidden" name="next" value="{{ next }}">
        <label>Heslo</label>
        <input type="password" name="password" placeholder="••••••••" autofocus required>
        <button type="submit" class="btn-login">Přihlásit se →</button>
      </form>
    </div>
  </div>
</body>
</html>
